# src/main/resources/application.properties
# Server Configuration
server.port=8080


# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/lifementor_db
spring.datasource.username=root
spring.datasource.password=student123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatIsExactly512BitsLongEnoughForHS512Algorithm1234567890ABCDEF
app.jwt.expiration=86400000 
app.reset-token.expiration=3600000 

# Logging
logging.level.com.lifementor=DEBUG
logging.level.org.springframework.security=DEBUG