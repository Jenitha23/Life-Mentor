# ============================================
# SERVER CONFIGURATION
# ============================================
spring.config.import=optional:file:.env.properties
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.servlet.context-path=/

# ============================================
# DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/lifementor_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Jeni@23j
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.id.new_generator_mappings=false

# ============================================
# JWT CONFIGURATION
# ============================================
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTThatIsExactly512BitsLongEnoughForHS512Algorithm1234567890ABCDEF
app.jwt.expiration=86400000 
app.reset-token.expiration=3600000 

# ============================================
# EMAIL CONFIGURATION
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=seprojecttest.23@gmail.com
spring.mail.password=yyngbzcshoqspdeu
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2

# ============================================
# FRONTEND CONFIGURATION
# ============================================
app.frontend.url=http://localhost:3000
app.frontend.reset-password-path=/reset-password
app.application.name=Life Mentor

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=uploads/temp

# ============================================
# PROFILE MANAGEMENT CONFIGURATION
# ============================================
app.upload.profile-pictures-dir=uploads/profile-pictures
app.base-url=http://localhost:8080
app.static-files.path=/files

# ============================================
# GEMINI AI CONFIGURATION
# ============================================
app.ai.gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta/models}
app.ai.gemini.api.key=${GEMINI_API_KEY:${AI_CHAT_API_KEY:}}
app.ai.gemini.model=${GEMINI_MODEL:${AI_CHAT_MODEL:gemini-2.5-flash}}
app.ai.gemini.max-output-tokens=${GEMINI_MAX_OUTPUT_TOKENS:${AI_CHAT_MAX_TOKENS:1024}}
app.ai.gemini.temperature=${GEMINI_TEMPERATURE:${AI_CHAT_TEMPERATURE:0.7}}

# ============================================
# DAILY CHECK-IN CONFIGURATION
# ============================================
app.checkin.questions.default-count=10
app.checkin.reminder.enabled=true
app.checkin.reminder.time=20:00
app.checkin.reminder.question-count=3
app.checkin.streak.calculation-enabled=true
app.checkin.streak.grace-period-days=1

# ============================================
# WELLBEING CONFIGURATION
# ============================================
app.wellbeing.low-mood-threshold=2
app.wellbeing.consecutive-low-mood-alert=3
app.wellbeing.missed-checkins-alert=3
app.wellbeing.alert-check-interval=24h
app.wellbeing.mood-trend-days=7

# ============================================
# GOAL CONFIGURATION
# ============================================
app.goals.default-duration-days=30
app.goals.reminder.enabled=true
app.goals.reminder.frequency=weekly
app.goals.progress-update-reminder-days=7

# ============================================
# LOGGING CONFIGURATION
# ============================================
logging.level.com.lifementor=INFO
logging.level.org.springframework.mail=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.file.name=logs/lifementor.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# MANAGEMENT ENDPOINTS
# ============================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.db.enabled=true
management.health.mail.enabled=true

# ============================================
# CACHE CONFIGURATION
# ============================================
spring.cache.type=simple
spring.cache.cache-names=users,assessments,checkins
spring.cache.redis.time-to-live=600000

# ============================================
# ASYNC CONFIGURATION
# ============================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=async-
